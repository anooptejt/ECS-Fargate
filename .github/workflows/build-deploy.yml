name: Build and Deploy to ECS

on:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/**'
      - 'src/**'
      - 'Dockerfile'
  pull_request:
    branches: [main, master]
    paths:
      - '.github/workflows/**'
      - 'src/**'
      - 'Dockerfile'
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: 'Skip ECS deployment'
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: ecs-fargate-cluster
  ECS_SERVICE: ecs-fargate-service
  CONTAINER_NAME: ecs-fargate-demo
  ECS_TASK_DEFINITION: ecs-fargate-demo

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            BRANCH="${GITHUB_REF_NAME//\//-}"
            VERSION="${BRANCH}-${SHORT_SHA}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        if: github.event_name != 'pull_request'
        run: |
          IMAGE_TAG=${{ secrets.DOCKERHUB_USERNAME }}/ecs-fargate:${{ steps.version.outputs.version }}
          docker build \
            --build-arg APP_VERSION=${{ steps.version.outputs.version }} \
            -t ${IMAGE_TAG} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ecs-fargate:latest \
            .
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Push to Docker Hub
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.IMAGE_TAG }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ecs-fargate:latest

      - name: Configure AWS credentials
        if: github.event_name != 'pull_request' && inputs.skip_deploy != true
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS task definition with new image
        if: github.event_name != 'pull_request' && inputs.skip_deploy != true
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_DEFINITION }} \
            --query 'taskDefinition' --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | python3 -c "
          import sys, json
          td = json.load(sys.stdin)
          for key in ['taskDefinitionArn','revision','status','requiresAttributes',
                      'compatibilities','registeredAt','registeredBy']:
              td.pop(key, None)
          for c in td['containerDefinitions']:
              if c['name'] == '${{ env.CONTAINER_NAME }}':
                  c['image'] = '${{ env.IMAGE_TAG }}'
          print(json.dumps(td))
          ")

          NEW_ARN=$(echo "$NEW_TASK_DEF" | aws ecs register-task-definition \
            --cli-input-json file:///dev/stdin \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          echo "NEW_TASK_DEF_ARN=${NEW_ARN}" >> $GITHUB_ENV

      - name: Deploy to ECS Fargate
        if: github.event_name != 'pull_request' && inputs.skip_deploy != true
        run: |
          echo "Deploying to ECS Fargate..."
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --task-definition ${{ env.NEW_TASK_DEF_ARN }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment
        if: github.event_name != 'pull_request' && inputs.skip_deploy != true
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}

      - name: Get service public IP
        if: github.event_name != 'pull_request' && inputs.skip_deploy != true
        id: get-ip
        run: |
          TASK_ARN=$(aws ecs list-tasks --cluster ${{ env.ECS_CLUSTER }} --service-name ${{ env.ECS_SERVICE }} --query 'taskArns[0]' --output text --region ${{ env.AWS_REGION }})
          ENI_ID=$(aws ecs describe-tasks --cluster ${{ env.ECS_CLUSTER }} --tasks $TASK_ARN --query 'tasks[0].attachments[0].details[?name==`networkInterfaceId`].value' --output text --region ${{ env.AWS_REGION }})
          PUBLIC_IP=$(aws ec2 describe-network-interfaces --network-interface-ids $ENI_ID --query 'NetworkInterfaces[0].Association.PublicIp' --output text --region ${{ env.AWS_REGION }})
          echo "public_ip=${PUBLIC_IP}" >> $GITHUB_OUTPUT
          echo ""
          echo "================================================"
          echo "Deployment Complete!"
          echo "Application URL: http://${PUBLIC_IP}:8080"
          echo "Health Check:    http://${PUBLIC_IP}:8080/api/health"
          echo "API Info:        http://${PUBLIC_IP}:8080/api/info"
          echo "================================================"
