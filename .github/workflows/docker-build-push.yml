name: Build, Push and Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: 'Skip ECS deployment (build & push only)'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-east-1
  ECS_CLUSTER: ecs-fargate-cluster
  ECS_SERVICE: ecs-fargate-service
  ECS_TASK_FAMILY: ecs-fargate-demo
  CONTAINER_NAME: ecs-fargate-demo

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image-ref.outputs.image }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine image version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            BRANCH="${GITHUB_REF_NAME//\//-}"
            VERSION="${BRANCH}-${SHORT_SHA}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (non-main branch — versioned tag only)
        if: github.ref_type == 'branch' && github.ref_name != 'main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: APP_VERSION=${{ steps.version.outputs.version }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ecs-fargate:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (main branch — versioned + latest)
        if: github.ref_type == 'branch' && github.ref_name == 'main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ecs-fargate:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ecs-fargate:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (git tag — semver + latest)
        if: github.ref_type == 'tag'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ecs-fargate:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ecs-fargate:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export full image reference
        id: image-ref
        run: |
          echo "image=${{ secrets.DOCKERHUB_USERNAME }}/ecs-fargate:${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Image summary
        run: |
          echo "### Docker Image Published" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image:** \`${{ secrets.DOCKERHUB_USERNAME }}/ecs-fargate:${{ steps.version.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: build-and-push
    # Skip on PRs, on non-main branches (unless manually triggered), or when skip_deploy=true
    if: |
      github.event_name != 'pull_request' &&
      inputs.skip_deploy != true &&
      (github.ref_name == 'main' || github.ref_type == 'tag' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS task definition with new Docker Hub image
        id: task-def
        run: |
          IMAGE="${{ needs.build-and-push.outputs.image }}"
          echo "Updating task definition to use image: ${IMAGE}"

          # Fetch current task definition, strip read-only fields, inject new image
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_FAMILY }} \
            --query 'taskDefinition' \
            --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | python3 -c "
          import sys, json
          td = json.load(sys.stdin)
          # Remove fields that cannot be included in register-task-definition
          for key in ['taskDefinitionArn','revision','status','requiresAttributes',
                      'compatibilities','registeredAt','registeredBy']:
              td.pop(key, None)
          # Update image for the target container
          for c in td['containerDefinitions']:
              if c['name'] == '${{ env.CONTAINER_NAME }}':
                  c['image'] = sys.argv[1]
          print(json.dumps(td))
          " "$IMAGE")

          # Register the new revision
          NEW_ARN=$(echo "$NEW_TASK_DEF" | aws ecs register-task-definition \
            --cli-input-json file:///dev/stdin \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "New task definition ARN: ${NEW_ARN}"
          echo "task_def_arn=${NEW_ARN}" >> "$GITHUB_OUTPUT"

      - name: Deploy new task definition to ECS service
        run: |
          echo "Deploying to ECS Fargate..."
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --task-definition ${{ steps.task-def.outputs.task_def_arn }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for service to stabilise
        run: |
          echo "Waiting for service to reach steady state..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}

      - name: Resolve and report public IP
        id: get-ip
        run: |
          TASK_ARN=$(aws ecs list-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service-name ${{ env.ECS_SERVICE }} \
            --query 'taskArns[0]' --output text \
            --region ${{ env.AWS_REGION }})

          ENI_ID=$(aws ecs describe-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].attachments[0].details[?name==`networkInterfaceId`].value' \
            --output text --region ${{ env.AWS_REGION }})

          PUBLIC_IP=$(aws ec2 describe-network-interfaces \
            --network-interface-ids "$ENI_ID" \
            --query 'NetworkInterfaces[0].Association.PublicIp' \
            --output text --region ${{ env.AWS_REGION }})

          echo "public_ip=${PUBLIC_IP}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "================================================"
          echo "  Deployment Complete!"
          echo "  Image:        ${{ needs.build-and-push.outputs.image }}"
          echo "  Root:         http://${PUBLIC_IP}:8080"
          echo "  Health Check: http://${PUBLIC_IP}:8080/api/health"
          echo "  Info:         http://${PUBLIC_IP}:8080/api/info"
          echo "================================================"

      - name: Deployment summary
        run: |
          echo "### ECS Fargate Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image:** \`${{ needs.build-and-push.outputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Public IP:** \`${{ steps.get-ip.outputs.public_ip }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Health:** http://${{ steps.get-ip.outputs.public_ip }}:8080/api/health" >> "$GITHUB_STEP_SUMMARY"
